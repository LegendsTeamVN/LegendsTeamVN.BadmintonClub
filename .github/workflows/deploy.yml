name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          
      - name: Restore dependencies
        run: dotnet restore LegendsTeamVN.BadmintonClub.slnx
        
      - name: Build
        run: dotnet build LegendsTeamVN.BadmintonClub.slnx --no-restore -c Release
        
      - name: Test
        run: dotnet test LegendsTeamVN.BadmintonClub.slnx --no-build --verbosity normal -c Release

  build-and-push-docker:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Convert Image Name to Lowercase
        run: echo "IMAGE_NAME_LC=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
        
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
          tags: |
            type=raw,value=latest
            type=sha
            
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Migrator Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.migrator
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}-migrator:latest
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push-docker
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/badmintonclub/"

      - name: Deploy to self-hosted server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p ~/badmintonclub
            cd ~/badmintonclub
            
            # Convert image name to lowercase as required by GHCR
            export IMAGE_NAME=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
            export MIGRATOR_IMAGE="${IMAGE_NAME}-migrator:latest"
            
            # Login to GHCR to pull the image (useful if the repo/image is private)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull latest images
            docker pull $IMAGE_NAME:latest
            docker pull $MIGRATOR_IMAGE
            
            # Write env file for docker-compose securely using GitHub Secrets
            cat <<EOF > .env
            API_IMAGE=$IMAGE_NAME:latest
            MIGRATOR_IMAGE=$MIGRATOR_IMAGE
            DB_CONNECTION_STRING=${{ secrets.DB_CONNECTION_STRING }}
            REDIS_CONNECTION_STRING=${{ secrets.REDIS_CONNECTION_STRING }}
            JWT_ISSUER=${{ secrets.JWT_ISSUER }}
            JWT_AUDIENCE=${{ secrets.JWT_AUDIENCE }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRE_MIN=${{ secrets.JWT_EXPIRE_MIN }}
            RABBITMQ_HOST=${{ secrets.RABBITMQ_HOST }}
            RABBITMQ_VHOST=${{ secrets.RABBITMQ_VHOST }}
            RABBITMQ_PORT=${{ secrets.RABBITMQ_PORT }}
            RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}
            RABBITMQ_PASS=${{ secrets.RABBITMQ_PASS }}
            EOF
            
            # Restart the API container
            docker compose up -d --force-recreate
            
            # Clean up dangling images to save disk space
            docker image prune -f
