version: '3.8'

services:
  api:
    image: ${API_IMAGE}
    container_name: badmintonclub-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Database=${DB_CONNECTION_STRING}
      - ConnectionStrings__Redis=${REDIS_CONNECTION_STRING}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__SecretKey=${JWT_SECRET}
      - Jwt__ExpireMin=${JWT_EXPIRE_MIN}
      - MasstransitConfiguration__Host=${RABBITMQ_HOST}
      - MasstransitConfiguration__VHost=${RABBITMQ_VHOST}
      - MasstransitConfiguration__Port=${RABBITMQ_PORT}
      - MasstransitConfiguration__UserName=${RABBITMQ_USER}
      - MasstransitConfiguration__Password=${RABBITMQ_PASS} 

  migrator:
    image: ${MIGRATOR_IMAGE}
    container_name: badmintonclub-migrator
    profiles:
      - migration
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Database=${DB_CONNECTION_STRING}
      - ConnectionStrings__Redis=${REDIS_CONNECTION_STRING}
      - ConnectionStrings__MigrationsAssembly=LegendsTeamVN.BadmintonClub.Migrator